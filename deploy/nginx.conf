limit_req_zone $binary_remote_addr zone=auth_login:10m rate=10r/m;

server {
  listen 443 ssl default_server;
  server_name _;
  ssl_certificate /etc/nginx/tls/tls.crt;
  ssl_certificate_key /etc/nginx/tls/tls.key;
  return 444;
}

server {
  listen 443 ssl;
  server_name qa-report.company.ru;
  ssl_certificate /etc/nginx/tls/tls.crt;
  ssl_certificate_key /etc/nginx/tls/tls.key;
  client_max_body_size 150m;

  location = /api/auth/login {
    limit_req zone=auth_login burst=5 nodelay;
    proxy_pass http://qa-report:4173;
    include /etc/nginx/query-port-proxy.conf;
  }

  location / {
    proxy_pass http://qa-report:4173;
    include /etc/nginx/query-port-proxy.conf;
  }
}
